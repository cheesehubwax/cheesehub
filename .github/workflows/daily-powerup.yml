name: Daily CHEESE Powerup

on:
  schedule:
    # Cluster of attempts near 00:17 UTC. The first tick that actually
    # dispatches and succeeds performs the payout; every later tick exits
    # immediately via the GitHub-Actions run-history guard in run.ts.
    - cron: "17 0 * * *"   # primary
    - cron: "32 0 * * *"   # retry +15m
    - cron: "47 0 * * *"   # retry +30m
    - cron: "17 1 * * *"   # retry +1h
    - cron: "17 2 * * *"   # retry +2h
    - cron: "17 4 * * *"   # last-chance for badly delayed scheduler days
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Set to '1' to skip all transactions"
        required: false
        default: "0"
      force:
        description: "Set to '1' to bypass the 'already ran today' idempotency guard"
        required: false
        default: "0"
      allowlist:
        description: "Optional comma-separated account allowlist"
        required: false
        default: ""
      powerup_amount:
        description: "Override CHEESE per account (e.g. 1.0000). Empty = use repo var or default 1.0000"
        required: false
        default: ""
      min_staked:
        description: "Override min staked CHEESE eligibility (e.g. 5000). Empty = use repo var or default 5000"
        required: false
        default: ""

concurrency:
  group: daily-powerup
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  powerup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        working-directory: scripts/daily-powerup
        run: bun install

      - name: Run daily powerup
        working-directory: scripts/daily-powerup
        env:
          WAX_SIGNER_ACCOUNT: ${{ vars.WAX_SIGNER_ACCOUNT }}
          WAX_SIGNER_PERMISSION: ${{ vars.WAX_SIGNER_PERMISSION }}
          WAX_DAILYPOWER_KEY: ${{ secrets.WAX_DAILYPOWER_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          FORCE: ${{ github.event.inputs.force }}
          ALLOWLIST: ${{ github.event.inputs.allowlist }}
          MIN_STAKED: ${{ github.event.inputs.min_staked || vars.MIN_STAKED }}
          POWERUP_AMOUNT: ${{ github.event.inputs.powerup_amount || vars.POWERUP_AMOUNT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW_REF: ${{ github.workflow_ref }}
        run: bun run run.ts