<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Single Page App redirect for GitHub Pages
      // Stores the real path in sessionStorage, then redirects to the base.
      // index.html picks it up via history.replaceState.
      var pathSegmentsToKeep = 1; // keep /cheesehub/ prefix
      var l = window.location;
      sessionStorage.redirect = l.pathname + l.search + l.hash;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/')
      );
    </script>
  </head>
  <body></body>
</html>
